# fly.toml app configuration file generated for ziri-damp-dream-9252 on 2026-02-26T05:52:46-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ziri-damp-dream-9252'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  CONFIG_DIR = '/data'
  HOST = '0.0.0.0'
  NODE_ENV = 'production'
  PORT = '3100'

[http_service]
  internal_port = 3100
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 800

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
